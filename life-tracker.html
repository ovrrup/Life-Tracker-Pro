<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #161616;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #555555;
    --accent: #e8e8e8;
    --cyan: #7dd3c8;
    --gold: #c9a84c;
    --red: #c96b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRAIN TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 56px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo span {
    color: var(--cyan);
    font-style: italic;
  }

  .date-pill {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    animation: fadeUp 0.6s ease both;
  }

  .card.wide { grid-column: 1 / -1; }
  .card.tall { }

  .card-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* HABITS */
  .habits-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 8px;
  }

  .habit-day-label {
    text-align: center;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .habit-row {
    display: contents;
  }

  .habit-name {
    grid-column: 1 / -1;
    font-size: 0.8rem;
    color: var(--text);
    font-weight: 400;
    margin-top: 8px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .habit-dot {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: transparent;
  }

  .habit-dot.done {
    background: var(--cyan);
    border-color: var(--cyan);
    color: #0a0a0a;
  }

  .habit-dot:hover { transform: scale(1.1); border-color: var(--cyan); }

  /* MOOD */
  .mood-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 8px;
  }

  .mood-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    color: var(--muted);
    font-family: inherit;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    text-align: center;
  }

  .mood-btn.active {
    border-color: var(--cyan);
    background: rgba(125, 211, 200, 0.08);
    color: var(--text);
  }

  .mood-btn:hover { transform: translateY(-2px); border-color: var(--border); }

  .mood-note {
    margin-top: 16px;
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 300;
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    min-height: 70px;
  }

  .mood-note::placeholder { color: var(--muted); }
  .mood-note:focus { border-color: var(--cyan); }

  /* PROGRESS BARS */
  .tracker-item {
    margin-bottom: 20px;
  }

  .tracker-item:last-child { margin-bottom: 0; }

  .tracker-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .tracker-title { font-size: 0.85rem; font-weight: 400; }

  .tracker-pct {
    font-size: 0.7rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .bar-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--cyan);
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .bar-fill.gold { background: var(--gold); }
  .bar-fill.white { background: var(--accent); }

  /* TASKS */
  .task-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  .task-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
  }

  .task-input:focus { border-color: var(--cyan); }
  .task-input::placeholder { color: var(--muted); }

  .add-btn {
    background: var(--cyan);
    color: #0a0a0a;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.15s;
  }

  .add-btn:hover { opacity: 0.85; transform: scale(0.98); }

  .task-list { display: flex; flex-direction: column; gap: 6px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 300;
    animation: fadeUp 0.3s ease both;
    transition: opacity 0.3s;
  }

  .task-item.done-task {
    opacity: 0.38;
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-check {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .task-check.checked {
    background: var(--cyan);
    border-color: var(--cyan);
  }

  .task-check svg { display: none; }
  .task-check.checked svg { display: block; }

  .task-del {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: inherit;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .task-item:hover .task-del { opacity: 1; }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-num.cyan { color: var(--cyan); }
  .stat-num.gold { color: var(--gold); }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* JOURNAL */
  .journal-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    line-height: 1.7;
    outline: none;
    resize: none;
    min-height: 120px;
    transition: border-color 0.2s;
  }

  .journal-area::placeholder { color: var(--muted); }
  .journal-area:focus { border-color: var(--cyan); }

  .save-btn {
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .save-btn:hover { border-color: var(--text); color: var(--text); }
  .save-btn.saved { border-color: var(--cyan); color: var(--cyan); }

  /* SECTION DIVIDERS */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .card.wide { grid-column: 1; }
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-num { font-size: 1.6rem; }
    .habits-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .habit-dot { width: 28px; height: 28px; border-radius: 6px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Life<span>track</span></div>
    <div class="date-pill" id="today-date">—</div>
  </header>

  <!-- STATS ROW -->
  <div style="margin-bottom:16px; animation: fadeUp 0.6s ease both;">
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num cyan" id="stat-streak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-tasks">0</div>
        <div class="stat-label">Tasks Done</div>
      </div>
      <div class="stat-box">
        <div class="stat-num gold" id="stat-habits">0%</div>
        <div class="stat-label">Habits Today</div>
      </div>
    </div>
  </div>

  <div class="grid">

    <!-- HABITS -->
    <div class="card wide">
      <div class="card-label">Daily Habits</div>
      <div id="habits-container"></div>
    </div>

    <!-- TASKS -->
    <div class="card">
      <div class="card-label">Today's Tasks</div>
      <div class="task-input-row">
        <input class="task-input" id="task-input" placeholder="Add a task…" />
        <button class="add-btn" onclick="addTask()">Add</button>
      </div>
      <div class="task-list" id="task-list"></div>
    </div>

    <!-- MOOD -->
    <div class="card">
      <div class="card-label">Mood Check-in</div>
      <div class="mood-row">
        <button class="mood-btn" data-mood="1" onclick="setMood(1)" title="Rough">😞</button>
        <button class="mood-btn" data-mood="2" onclick="setMood(2)" title="Okay">😐</button>
        <button class="mood-btn" data-mood="3" onclick="setMood(3)" title="Good">🙂</button>
        <button class="mood-btn" data-mood="4" onclick="setMood(4)" title="Great">😊</button>
        <button class="mood-btn" data-mood="5" onclick="setMood(5)" title="Amazing">🤩</button>
      </div>
      <textarea class="mood-note" id="mood-note" placeholder="How's your day going?…" rows="3"></textarea>
    </div>

    <!-- TRACKERS -->
    <div class="card">
      <div class="card-label">Goals & Trackers</div>
      <div id="trackers-container"></div>
    </div>

    <!-- JOURNAL -->
    <div class="card">
      <div class="card-label">Journal</div>
      <textarea class="journal-area" id="journal" placeholder="What's on your mind today?&#10;&#10;Write freely — no rules here."></textarea>
      <button class="save-btn" id="save-btn" onclick="saveJournal()">Save Entry</button>
    </div>

  </div>
</div>

<script>
  // DATE
  const now = new Date();
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  // STATE
  const key = d => `lt-${now.toISOString().slice(0,10)}-${d}`;
  const load = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } };
  const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  // HABITS
  const habitNames = ['Meditate', 'Exercise', 'Read', 'Water', 'Sleep 8h', 'No phone', 'Gratitude'];
  const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let habitData = load(key('habits'), {});

  function renderHabits() {
    const c = document.getElementById('habits-container');
    let html = `<div class="habits-grid">`;
    days.forEach(d => html += `<div class="habit-day-label">${d}</div>`);
    habitNames.forEach((name, hi) => {
      html += `<div class="habit-name">${name}</div>`;
      days.forEach((d, di) => {
        const id = `h${hi}-${di}`;
        const done = habitData[id];
        html += `<div class="habit-dot${done?' done':''}" onclick="toggleHabit('${id}')">${done?'✓':''}</div>`;
      });
    });
    html += '</div>';
    c.innerHTML = html;
    updateHabitStat();
  }

  function toggleHabit(id) {
    habitData[id] = !habitData[id];
    save(key('habits'), habitData);
    renderHabits();
  }

  function updateHabitStat() {
    const todayDay = now.getDay();
    let done = 0;
    habitNames.forEach((_, hi) => { if (habitData[`h${hi}-${todayDay}`]) done++; });
    document.getElementById('stat-habits').textContent = Math.round((done / habitNames.length) * 100) + '%';
  }

  renderHabits();

  // TRACKERS
  const trackers = [
    { name: 'Read 20 books', current: 4, goal: 20, color: 'cyan' },
    { name: 'Workout 100 days', current: 48, goal: 100, color: 'white' },
    { name: 'Learn Spanish', current: 33, goal: 100, color: 'gold' },
    { name: 'Save $5000', current: 2100, goal: 5000, color: 'cyan' },
  ];

  function renderTrackers() {
    const c = document.getElementById('trackers-container');
    c.innerHTML = trackers.map(t => {
      const pct = Math.round((t.current / t.goal) * 100);
      return `<div class="tracker-item">
        <div class="tracker-meta">
          <span class="tracker-title">${t.name}</span>
          <span class="tracker-pct">${pct}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${t.color}" style="width:0%" data-target="${pct}%"></div>
        </div>
      </div>`;
    }).join('');
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.dataset.target);
    });
  }

  renderTrackers();

  // TASKS
  let tasks = load(key('tasks'), []);

  function renderTasks() {
    const list = document.getElementById('task-list');
    if (!tasks.length) {
      list.innerHTML = `<div style="font-size:0.78rem;color:var(--muted);padding:8px 0;">No tasks yet — add one above.</div>`;
      document.getElementById('stat-tasks').textContent = '0';
      return;
    }
    list.innerHTML = tasks.map((t, i) => `
      <div class="task-item${t.done?' done-task':''}">
        <div class="task-check${t.done?' checked':''}" onclick="toggleTask(${i})">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4l3 3 5-6" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span>${t.text}</span>
        <button class="task-del" onclick="deleteTask(${i})">remove</button>
      </div>
    `).join('');
    const done = tasks.filter(t => t.done).length;
    document.getElementById('stat-tasks').textContent = done;
  }

  function addTask() {
    const inp = document.getElementById('task-input');
    const text = inp.value.trim();
    if (!text) return;
    tasks.push({ text, done: false });
    save(key('tasks'), tasks);
    inp.value = '';
    renderTasks();
  }

  function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    save(key('tasks'), tasks);
    renderTasks();
  }

  function deleteTask(i) {
    tasks.splice(i, 1);
    save(key('tasks'), tasks);
    renderTasks();
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  renderTasks();

  // MOOD
  let currentMood = load(key('mood'), 0);
  if (currentMood) {
    document.querySelector(`[data-mood="${currentMood}"]`)?.classList.add('active');
  }
  const moodNote = load(key('mood-note'), '');
  if (moodNote) document.getElementById('mood-note').value = moodNote;

  function setMood(m) {
    currentMood = m;
    save(key('mood'), m);
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-mood="${m}"]`).classList.add('active');
  }

  document.getElementById('mood-note').addEventListener('input', e => {
    save(key('mood-note'), e.target.value);
  });

  // JOURNAL
  const savedJournal = load(key('journal'), '');
  if (savedJournal) document.getElementById('journal').value = savedJournal;

  document.getElementById('journal').addEventListener('input', e => {
    save(key('journal'), e.target.value);
    document.getElementById('save-btn').classList.remove('saved');
    document.getElementById('save-btn').textContent = 'Save Entry';
  });

  function saveJournal() {
    save(key('journal'), document.getElementById('journal').value);
    const btn = document.getElementById('save-btn');
    btn.textContent = 'Saved ✓';
    btn.classList.add('saved');
  }

  // STREAK (simple: count consecutive days with any task done)
  let streak = 0;
  const today = now.toISOString().slice(0,10);
  let d = new Date(now);
  while (true) {
    const k2 = `lt-${d.toISOString().slice(0,10)}-tasks`;
    const t = load(k2, []);
    if (t.some(x => x.done)) { streak++; d.setDate(d.getDate()-1); }
    else break;
    if (streak > 365) break;
  }
  document.getElementById('stat-streak').textContent = streak;
</script>
</body>
</html>
